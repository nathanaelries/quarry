<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" font-family="Georgia, serif">
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="900" height="420" fill="#12161B"/>
  <text x="30" y="40" fill="#FFE39A" font-size="22" letter-spacing="2">SACRED GEOMETRY — the ship's anatomy, not its wallpaper</text>

  <!-- Merkavah star-tetrahedron -->
  <g filter="url(#glow)" fill="none" stroke="#B79BFF" stroke-width="2.4">
    <polygon points="150,90 245,255 55,255"/>
    <polygon points="150,310 55,145 245,145"/>
    <path d="M150,90 L150,310 M55,255 L245,145 M245,255 L55,145" stroke="#8FB6FF" stroke-width="1.2" opacity="0.7"/>
  </g>
  <circle cx="150" cy="200" r="118" fill="none" stroke="#33414D" stroke-width="1"/>
  <text x="150" y="392" fill="#B79BFF" font-size="15" text-anchor="middle">Merkavah — the Chariot</text>
  <text x="150" y="410" fill="#7f8894" font-size="11" text-anchor="middle">engine / spirit-blade / ascent motif</text>

  <!-- Seed of Life -->
  <g filter="url(#glow)" fill="none" stroke="#4FD4E0" stroke-width="2">
    <circle cx="450" cy="200" r="52"/>
    <circle cx="502" cy="200" r="52"/><circle cx="476" cy="245" r="52"/><circle cx="424" cy="245" r="52"/>
    <circle cx="398" cy="200" r="52"/><circle cx="424" cy="155" r="52"/><circle cx="476" cy="155" r="52"/>
  </g>
  <circle cx="450" cy="200" r="104" fill="none" stroke="#33414D" stroke-width="1"/>
  <text x="450" y="392" fill="#4FD4E0" font-size="15" text-anchor="middle">Seed / Flower of Life</text>
  <text x="450" y="410" fill="#7f8894" font-size="11" text-anchor="middle">portals · gravity lattices · symmetry</text>

  <!-- Tree of Life: 10 sefirot + 22 paths -->
  <g stroke="#D9A441" stroke-width="1.6" opacity="0.85">
    <line x1="750" y1="60" x2="805" y2="108"/><line x1="750" y1="60" x2="695" y2="108"/><line x1="750" y1="60" x2="750" y2="214"/>
    <line x1="805" y1="108" x2="695" y2="108"/><line x1="805" y1="108" x2="750" y2="214"/><line x1="805" y1="108" x2="805" y2="175"/>
    <line x1="695" y1="108" x2="750" y2="214"/><line x1="695" y1="108" x2="695" y2="175"/>
    <line x1="805" y1="175" x2="695" y2="175"/><line x1="805" y1="175" x2="750" y2="214"/><line x1="805" y1="175" x2="805" y2="271"/>
    <line x1="695" y1="175" x2="750" y2="214"/><line x1="695" y1="175" x2="695" y2="271"/>
    <line x1="750" y1="214" x2="805" y2="271"/><line x1="750" y1="214" x2="695" y2="271"/><line x1="750" y1="214" x2="750" y2="310"/>
    <line x1="805" y1="271" x2="695" y2="271"/><line x1="805" y1="271" x2="750" y2="310"/><line x1="805" y1="271" x2="750" y2="367"/>
    <line x1="695" y1="271" x2="750" y2="310"/><line x1="695" y1="271" x2="750" y2="367"/>
    <line x1="750" y1="310" x2="750" y2="367"/>
  </g>
  <g filter="url(#glow)" fill="#FFE39A" stroke="#D9A441" stroke-width="1.5">
    <circle cx="750" cy="60" r="13"/>
    <circle cx="805" cy="108" r="13"/><circle cx="695" cy="108" r="13"/>
    <circle cx="805" cy="175" r="13"/><circle cx="695" cy="175" r="13"/>
    <circle cx="750" cy="214" r="14"/>
    <circle cx="805" cy="271" r="13"/><circle cx="695" cy="271" r="13"/>
    <circle cx="750" cy="310" r="13"/>
    <circle cx="750" cy="367" r="15"/>
  </g>
  <text x="750" y="392" fill="#FFE39A" font-size="15" text-anchor="middle">Etz Chaim — Tree of Life</text>
  <text x="750" y="410" fill="#7f8894" font-size="11" text-anchor="middle">10 sefirot + 22 paths = the ship's power system</text>
</svg>
